<div class="auth-overlay" id="auth-overlay" onclick="if(event.target===this)closeAuth()">
  <div class="auth-modal">
    <button class="auth-close" onclick="closeAuth()" aria-label="close">&times;</button>
    <div class="auth-tabs">
      <button id="tab-login" class="auth-tab active" onclick="setAuthTab('login')" data-i18n="authTabLogin"></button>
      <button id="tab-signup" class="auth-tab" onclick="setAuthTab('signup')" data-i18n="authTabSignup"></button>
    </div>
    <h3 class="auth-title disp" id="auth-title" data-i18n="authTitleLogin"></h3>
    <p class="auth-sub" data-i18n="authSub"></p>
    <form class="auth-form" id="auth-form" onsubmit="handleAuthSubmit(event)">
      <div class="auth-field" id="auth-name-field">
        <label data-i18n="authNameLabel"></label>
        <input type="text" id="auth-name-input" data-i18n-ph="authNamePh" autocomplete="name"/>
      </div>
      <div class="auth-field">
        <label data-i18n="authEmailLabel"></label>
        <input type="email" id="auth-email-input" data-i18n-ph="authEmailPh" autocomplete="email" required/>
      </div>
      <div class="auth-field">
        <label data-i18n="authPassLabel"></label>
        <input type="password" id="auth-pass-input" data-i18n-ph="authPassPh" autocomplete="current-password" required minlength="6"/>
      </div>
      <p class="auth-error" id="auth-error"></p>
      <button type="submit" class="btn-primary auth-submit" id="auth-submit" data-i18n="authSubmitLogin"></button>
    </form>
    <p class="auth-count" id="auth-user-count"></p>
    <p class="auth-note" data-i18n="authNote"></p>
  </div>
</div>

<div class="auth-overlay" id="profile-overlay" onclick="if(event.target===this)closeProfile()">

    <button class="auth-close" onclick="closeProfile()" aria-label="close">&times;</button>
    <h3 class="auth-title disp" data-i18n="profileTitle"></h3>
    <p class="auth-sub" data-i18n="profileSub"></p>

    <form class="auth-form" onsubmit="event.preventDefault(); saveProfile();">
      <div class="profile-row">
        <div class="auth-field">
          <label data-i18n="profileAgeLabel"></label>
          <input type="number" min="10" max="100" id="profile-age"/>

        </div>

      <div class="profile-row">
        <div class="auth-field">
          <label data-i18n="profileHeightLabel"></label>
          <input type="number" min="100" max="250" id="profile-height"/>
        </div>
        <div class="auth-field">
          <label data-i18n="profileWeightLabel"></label>
          <input type="number" min="30" max="300" id="profile-weight"/>
        </div>
      </div>
      <div class="auth-field">
        <label data-i18n="profileGoalLabel"></label>
        <input type="text" id="profile-goal" data-i18n-ph="profileGoalPh"/>
      </div>
      <div class="auth-field">
        <label data-i18n="profileLevelLabel"></label>

          <option value="beginner" data-i18n="profileLevelBeginner"></option>
          <option value="intermediate" data-i18n="profileLevelIntermediate"></option>

      </div>
      <div class="auth-field">
        <label data-i18n="profileInjuriesLabel"></label>
        <input type="text" id="profile-injuries" data-i18n-ph="profileInjuriesPh"/>
      </div>
      <div class="auth-field">
        <label data-i18n="profileEquipmentLabel"></label>
        <input type="text" id="profile-equipment" data-i18n-ph="profileEquipmentPh"/>
      </div>
      <button type="submit" class="btn-primary auth-submit" data-i18n="profileSave"></button>
      <p class="auth-count" id="profile-save-status"></p>
    </form>

    <hr class="profile-divider"/>
    <h4 class="profile-log-title" data-i18n="logTitle"></h4>
    <form class="auth-form" onsubmit="event.preventDefault(); saveDailyLog();">
      <div class="profile-row">
        <div class="auth-field">
          <label data-i18n="logSleepLabel"></label>
          <input type="number" min="0" max="14" step="0.5" id="log-sleep"/>
        </div>
        <div class="auth-field">
          <label data-i18n="logWaterLabel"></label>
          <input type="number" min="0" max="20" id="log-water"/>
        </div>
      </div>
      <div class="auth-field">
        <label data-i18n="logMoodLabel"></label>

          <option value="neutral">😐</option>

      <div class="auth-field">

      </div>
      <button type="submit" class="btn-primary auth-submit" data-i18n="logSave"></button>
      <p class="auth-count" id="log-save-status"></p>
    </form>
