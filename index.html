<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --deep:#17302B;
  --deep-2:#1F3F38;
  --paper:#F2ECDD;
  --paper-2:#E9E1CB;
  --gold:#E3A857;
  --clay:#C1613F;
  --sage:#8FA88A;
  --ink:#17302B;
  --cream-ink:#F2ECDD;
  --line: rgba(23,48,43,0.14);
  --line-light: rgba(242,236,221,0.2);

  --disp-en:'Oswald', sans-serif;
  --disp-ar:'Cairo', sans-serif;
  --body-en:'Inter', sans-serif;
  --body-ar:'Cairo', sans-serif;
}

*{box-sizing:border-box; margin:0; padding:0;}

body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--body-en);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

[dir="rtl"] body{ font-family:var(--body-ar); }
[dir="rtl"] .disp{ font-family:var(--disp-ar); }
[dir="ltr"] .disp, .disp{ font-family:var(--disp-en); }

.disp{ font-family:var(--disp-en); }

a{color:inherit;}
img,svg{display:block; max-width:100%;}
button{font:inherit; cursor:pointer;}

.wrap{
  max-width:1120px;
  margin:0 auto;
  padding:0 28px;
}
@media (max-width:480px){
  .wrap{ padding:0 18px; }
}

/* ---------- NAV ---------- */
.nav{
  position:sticky; top:0; z-index:50;
  background:rgba(23,48,43,0.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line-light);
}
.nav .wrap{
  display:flex; align-items:center; justify-content:space-between;
  height:68px;
}
.brand{
  display:flex; align-items:center; gap:10px;
  color:var(--paper);
  font-weight:600;
  font-size:1.05rem;
  letter-spacing:0.01em;
}
.brand-mark{
  width:30px; height:30px;
  border-radius:50%;
  background:conic-gradient(var(--gold),var(--clay),var(--sage),var(--gold));
  flex-shrink:0;
}
.nav-links{ display:flex; align-items:center; gap:26px; }
.nav-links a{
  color:rgba(242,236,221,0.75); font-size:0.88rem; font-weight:600;
  text-decoration:none; transition:color .2s ease;
}
.nav-links a:hover{ color:var(--gold); }
.nav-actions{display:flex; align-items:center; gap:12px;}
.nav-login{
  background:transparent; color:var(--paper); border:1px solid var(--line-light);
  padding:8px 18px; border-radius:100px; font-weight:600; font-size:0.85rem;
}
.nav-login:hover{ border-color:var(--gold); color:var(--gold); }
.nav-user-badge{
  display:none; align-items:center; gap:9px;
  background:rgba(242,236,221,0.08); border:1px solid var(--line-light);
  padding:6px 8px 6px 14px; border-radius:100px;
}
[dir="rtl"] .nav-user-badge{ padding:6px 14px 6px 8px; }
.nav-user-dot{ width:8px; height:8px; border-radius:50%; background:var(--sage); flex-shrink:0; }
#nav-user-name{ color:var(--paper); font-size:0.85rem; font-weight:600; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.nav-logout{
  background:var(--gold); color:var(--deep); border:none; font-size:0.76rem; font-weight:700;
  padding:6px 12px; border-radius:100px;
}
@media (max-width:760px){ .nav-links{ display:none; } }
@media (max-width:480px){
  .nav .wrap{ height:60px; }
  .brand{ font-size:0.92rem; gap:7px; }
  .brand-mark{ width:24px; height:24px; }
  .nav-actions{ gap:7px; }
  .lang-toggle button{ padding:5px 10px; font-size:0.76rem; }
  .nav-login{ display:none; }
  .nav-cta{ padding:8px 14px; font-size:0.78rem; }
  #nav-user-name{ max-width:64px; }
  .nav-logout{ padding:5px 10px; font-size:0.7rem; }
}
.lang-toggle{
  display:flex; background:rgba(242,236,221,0.1); border:1px solid var(--line-light);
  border-radius:100px; padding:3px; gap:2px;
}
.lang-toggle button{
  border:none; background:transparent; color:var(--paper);
  padding:6px 14px; border-radius:100px; font-size:0.82rem; font-weight:600;
  opacity:0.6; transition:all .25s ease;
}
.lang-toggle button.active{ background:var(--gold); color:var(--deep); opacity:1; }
.nav-cta{
  background:var(--gold); color:var(--deep); border:none;
  padding:9px 20px; border-radius:100px; font-weight:700; font-size:0.85rem;
  transition:transform .2s ease;
}
.nav-cta:hover{ transform:translateY(-1px); }

/* ---------- HERO ---------- */
.hero{
  background:radial-gradient(120% 100% at 50% 0%, var(--deep-2) 0%, var(--deep) 60%);
  color:var(--paper);
  padding:88px 0 0;
  position:relative;
  overflow:hidden;
}
.hero .wrap{
  display:grid; grid-template-columns:1.1fr 0.9fr; gap:40px;
  align-items:center;
}
.eyebrow{
  display:inline-flex; align-items:center; gap:8px;
  font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--gold); font-weight:700; margin-bottom:22px;
}
.eyebrow::before{
  content:''; width:22px; height:1px; background:var(--gold);
}
[dir="rtl"] .eyebrow{ letter-spacing:0; }
h1.hero-title{
  font-size:clamp(2.4rem, 4.4vw, 3.8rem);
  line-height:1.06;
  font-weight:700;
  letter-spacing:-0.01em;
  text-transform:uppercase;
  margin-bottom:22px;
  color:var(--paper);
}
[dir="rtl"] h1.hero-title{ text-transform:none; letter-spacing:0; font-weight:800; }
h1.hero-title em{
  font-style:normal; color:var(--gold);
}
.hero-sub{
  font-size:1.08rem;
  color:rgba(242,236,221,0.78);
  max-width:480px;
  margin-bottom:34px;
}
.hero-actions{display:flex; gap:14px; flex-wrap:wrap;}
.btn-primary{
  background:var(--gold); color:var(--deep); border:none;
  padding:14px 26px; border-radius:100px; font-weight:700; font-size:0.95rem;
  transition:transform .2s ease, box-shadow .2s ease;
}
.btn-primary:hover{ transform:translateY(-2px); box-shadow:0 10px 24px rgba(227,168,87,0.25);}
.btn-ghost{
  background:transparent; color:var(--paper); border:1px solid var(--line-light);
  padding:14px 26px; border-radius:100px; font-weight:600; font-size:0.95rem;
}
.btn-ghost:hover{ border-color:var(--gold); color:var(--gold); }

/* Compass signature */
.compass-wrap{
  position:relative;
  display:flex; align-items:center; justify-content:center;
  padding:20px 0 80px;
}
.compass{
  width:340px; height:340px; max-width:90vw; max-height:90vw;
  position:relative;
}
.compass svg{ width:100%; height:100%; }
.compass-node{
  cursor:pointer;
  transition:transform .3s ease;
  transform-origin:center;
}
.compass-node:hover, .compass-node.active{ transform:scale(1.06); }
.compass-node text{
  font-family:var(--body-en); font-weight:700; font-size:12.5px;
  fill:var(--deep);
}
[dir="rtl"] .compass-node text{ font-family:var(--body-ar); font-size:13px; }
.compass-center{
  transition:transform .4s ease;
}
.compass-center.pulse{ animation:pulse 2.4s ease-in-out infinite; }
@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.05); }
}

/* ---------- DOMAINS ---------- */
.section{ padding:88px 0; }
.section-head{
  max-width:640px; margin-bottom:52px;
}
.tag{
  font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--clay); font-weight:700; margin-bottom:14px; display:block;
}
[dir="rtl"] .tag{ letter-spacing:0; }
h2.sec-title{
  font-size:clamp(1.7rem,3vw,2.4rem);
  font-weight:600; letter-spacing:-0.005em; line-height:1.15; margin-bottom:14px;
}
[dir="rtl"] h2.sec-title{ font-weight:800; letter-spacing:0; }
.sec-desc{ color:rgba(23,48,43,0.7); font-size:1.02rem; max-width:560px;}

.domains-grid{
  display:grid; grid-template-columns:repeat(3,1fr); gap:22px;
}
.domain-card{
  background:var(--paper-2);
  border:1px solid var(--line);
  border-radius:20px;
  padding:32px 26px;
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
}
.domain-card:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 34px rgba(23,48,43,0.1);
  border-color:var(--dot,var(--gold));
}
.domain-dot{
  width:38px; height:38px; border-radius:11px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:20px; font-size:1.2rem;
}
.domain-card h3{ font-size:1.15rem; font-weight:700; margin-bottom:10px; }
.domain-card p{ font-size:0.93rem; color:rgba(23,48,43,0.68); }

/* ---------- PROGRAMS ---------- */
.programs-section{ background:var(--paper-2); }
.programs-grid{
  display:grid; grid-template-columns:repeat(4,1fr); gap:20px;
}
.program-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:18px;
  padding:26px 22px;
  display:flex; flex-direction:column;
  position:relative;
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
}
.program-card:hover{
  transform:translateY(-4px);
  box-shadow:0 18px 34px rgba(23,48,43,0.1);
  border-color:var(--dot,var(--gold));
}
.program-card.featured-program{
  background:var(--deep); border-color:var(--deep); color:var(--paper);
}
.program-badge{
  position:absolute; top:-12px; inset-inline-start:22px;
  background:var(--gold); color:var(--deep); font-size:0.7rem; font-weight:800;
  padding:4px 12px; border-radius:100px;
}
.program-duration{
  font-family:var(--disp-en); font-weight:700; font-size:0.95rem; margin-bottom:14px; display:block;
}
[dir="rtl"] .program-duration{ font-family:var(--disp-ar); font-weight:800; }
.program-card h3{ font-size:1.02rem; font-weight:700; margin-bottom:8px; }
.program-card p{ font-size:0.86rem; color:rgba(23,48,43,0.65); margin-bottom:20px; flex:1; }
.program-card.featured-program p{ color:rgba(242,236,221,0.72); }
.program-btn{
  background:transparent; border:1px solid var(--line); color:var(--ink);
  padding:10px; border-radius:100px; font-weight:600; font-size:0.83rem;
  transition:all .2s ease;
}
.program-btn:hover{ border-color:var(--gold); color:var(--clay); }
.program-btn.light{ border-color:var(--line-light); color:var(--paper); }
.program-btn.light:hover{ border-color:var(--gold); color:var(--gold); }

/* ---------- HOW IT WORKS (dark) ---------- */
.how{ background:var(--deep); color:var(--paper); }
.how .tag{ color:var(--gold); }
.how .sec-desc{ color:rgba(242,236,221,0.7); }
.steps{
  display:grid; grid-template-columns:repeat(4,1fr); gap:0;
  margin-top:20px; position:relative;
}
.step{
  padding:0 20px 0 0;
  border-inline-start:1px solid var(--line-light);
  padding-inline-start:20px;
  position:relative;
}
.step:first-child{ border-inline-start:none; padding-inline-start:0; }
.step-num{
  font-family:var(--body-en); font-size:0.78rem; color:var(--gold);
  font-weight:700; letter-spacing:0.08em; margin-bottom:14px; display:block;
}
.step h4{ font-size:1.02rem; font-weight:700; margin-bottom:8px; }
.step p{ font-size:0.88rem; color:rgba(242,236,221,0.65); }

/* ---------- CHAT ---------- */
.chat-section{ background:var(--paper); }
.chat-shell{
  background:var(--deep);
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 30px 60px rgba(23,48,43,0.18);
  display:grid; grid-template-columns:260px 1fr;
  min-height:520px;
}
.chat-side{
  background:var(--deep-2);
  padding:28px 22px;
  border-inline-end:1px solid var(--line-light);
}
.chat-side h4{ color:var(--paper); font-size:0.95rem; margin-bottom:16px; font-weight:700;}
.persona-btn{
  display:flex; align-items:center; gap:10px;
  width:100%; text-align:start;
  background:transparent; border:1px solid transparent;
  color:rgba(242,236,221,0.75);
  padding:11px 12px; border-radius:12px; font-size:0.87rem; font-weight:500;
  margin-bottom:6px; transition:all .2s ease;
}
.persona-btn:hover{ background:rgba(242,236,221,0.06); }
.persona-btn.active{
  background:rgba(227,168,87,0.14); color:var(--gold); border-color:rgba(227,168,87,0.3);
}
.persona-dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }

.chat-main{ display:flex; flex-direction:column; background:var(--paper); }
.chat-header{
  padding:20px 26px; border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:12px;
}
.chat-avatar{
  width:36px; height:36px; border-radius:50%;
  background:conic-gradient(var(--gold),var(--clay),var(--sage),var(--gold));
  flex-shrink:0;
}
.chat-header-text strong{ display:block; font-size:0.95rem; }
.chat-header-text span{ font-size:0.78rem; color:rgba(23,48,43,0.55); }

.chat-messages{
  flex:1; padding:24px 26px; overflow-y:auto;
  display:flex; flex-direction:column; gap:16px;
  max-height:360px;
}
.msg{ max-width:78%; padding:12px 16px; border-radius:16px; font-size:0.92rem; line-height:1.55; }
.msg.user{
  align-self:flex-end; background:var(--gold); color:var(--deep); border-end-end-radius:4px;
}
[dir="rtl"] .msg.user{ align-self:flex-start; }
.msg.bot{
  align-self:flex-start; background:var(--paper-2); border:1px solid var(--line); border-end-start-radius:4px;
}
[dir="rtl"] .msg.bot{ align-self:flex-end; }
.msg.bot.typing{ color:rgba(23,48,43,0.45); font-style:italic; }

.chat-input-row{
  padding:18px 22px; border-top:1px solid var(--line);
  display:flex; gap:10px; align-items:center;
}
.chat-input-row input{
  flex:1; border:1px solid var(--line); background:var(--paper-2);
  border-radius:100px; padding:12px 18px; font-size:0.92rem; color:var(--ink);
  font-family:inherit;
}
.chat-input-row input:focus{ outline:2px solid var(--gold); outline-offset:1px; }
.chat-send{
  background:var(--deep); color:var(--paper); border:none;
  width:44px; height:44px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:transform .2s ease;
}
.chat-send:hover{ transform:scale(1.06); }
.chat-send:disabled{ opacity:0.5; cursor:default; }
[dir="rtl"] .chat-send svg{ transform:scaleX(-1); }

/* ---------- PRICING ---------- */
.pricing-section{ background:var(--paper-2); }
.pricing-currency-note{ font-size:0.8rem; color:var(--gold); font-weight:600; margin-top:10px; }
.pricing-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:22px; align-items:stretch; }
.price-card{
  background:var(--paper); border:1px solid var(--line); border-radius:20px;
  padding:32px 26px; display:flex; flex-direction:column; position:relative;
}
.price-card.featured{
  background:var(--deep); color:var(--paper); border-color:var(--deep);
  transform:scale(1.03); box-shadow:0 24px 44px rgba(23,48,43,0.18);
}
.price-badge{
  position:absolute; top:-13px; inset-inline-start:26px;
  background:var(--gold); color:var(--deep); font-size:0.72rem; font-weight:800;
  padding:5px 14px; border-radius:100px; letter-spacing:0.03em;
}
.price-plan{ font-size:0.85rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--clay); }
.price-card.featured .price-plan{ color:var(--gold); }
[dir="rtl"] .price-plan{ letter-spacing:0; }
.price-amount{ font-family:var(--disp-en); font-size:2.4rem; font-weight:700; margin:14px 0 6px; }
[dir="rtl"] .price-amount{ font-family:var(--disp-ar); font-weight:800; }
.price-note{ font-size:0.85rem; opacity:0.65; margin-bottom:22px; }
.price-feats{ list-style:none; margin-bottom:28px; flex:1; }
.price-feats li{
  font-size:0.9rem; padding:9px 0; border-top:1px solid var(--line);
  display:flex; align-items:center; gap:9px;
}
.price-card.featured .price-feats li{ border-color:var(--line-light); }
.price-feats li::before{ content:'✓'; color:var(--gold); font-weight:700; }
.price-btn{ width:100%; text-align:center; justify-content:center; }
.price-card.featured .btn-primary{ background:var(--gold); }

/* ---------- ABOUT ---------- */
.about-section{ background:var(--paper); }
.about-wrap{ display:grid; grid-template-columns:1.1fr 0.9fr; gap:54px; align-items:start; }
.about-lead{ font-weight:600; color:var(--ink); opacity:0.9; margin-bottom:14px; }
.about-values{ display:flex; flex-direction:column; gap:22px; }
.about-value{
  border-inline-start:2px solid var(--gold); padding-inline-start:18px;
}
.about-value strong{ display:block; font-size:1rem; margin-bottom:6px; }
.about-value p{ font-size:0.9rem; color:rgba(23,48,43,0.65); }

/* ---------- AUTH MODAL ---------- */
.auth-overlay{
  position:fixed; inset:0; background:rgba(23,48,43,0.55); backdrop-filter:blur(3px);
  display:none; align-items:center; justify-content:center; z-index:100; padding:20px;
}
.auth-overlay.open{ display:flex; }
.auth-modal{
  background:var(--paper); border-radius:22px; padding:36px 32px; width:100%; max-width:400px;
  position:relative; box-shadow:0 30px 60px rgba(0,0,0,0.25);
}
.auth-close{
  position:absolute; top:16px; inset-inline-end:16px; background:transparent; border:none;
  font-size:1.4rem; line-height:1; color:rgba(23,48,43,0.5); width:30px; height:30px;
}
.auth-tabs{ display:flex; gap:4px; background:var(--paper-2); border-radius:100px; padding:4px; margin-bottom:22px; }
.auth-tab{
  flex:1; border:none; background:transparent; padding:9px; border-radius:100px;
  font-weight:700; font-size:0.85rem; color:rgba(23,48,43,0.55);
}
.auth-tab.active{ background:var(--deep); color:var(--paper); }
.auth-title{ font-size:1.4rem; font-weight:700; margin-bottom:6px; }
.auth-sub{ font-size:0.87rem; color:rgba(23,48,43,0.6); margin-bottom:22px; }
.auth-form{ display:flex; flex-direction:column; gap:14px; }
.auth-field{ display:flex; flex-direction:column; gap:6px; }
.auth-field label{ font-size:0.8rem; font-weight:600; opacity:0.75; }
.auth-field input{
  border:1px solid var(--line); background:var(--paper-2); border-radius:12px;
  padding:11px 14px; font-size:0.92rem; color:var(--ink); font-family:inherit;
}
.auth-field input:focus{ outline:2px solid var(--gold); outline-offset:1px; }
.auth-submit{ width:100%; text-align:center; justify-content:center; margin-top:6px; }
.auth-submit:disabled{ opacity:0.6; cursor:default; }
.auth-error{
  font-size:0.82rem; color:var(--clay); font-weight:600; min-height:0;
  margin:-4px 0 0;
}
.auth-error:empty{ display:none; }
.auth-count{
  font-size:0.8rem; color:var(--sage); font-weight:600; text-align:center; margin-top:16px;
}
.auth-note{ font-size:0.78rem; color:rgba(23,48,43,0.5); text-align:center; margin-top:16px; }

/* ---------- FOOTER ---------- */
.footer{ background:var(--deep); color:rgba(242,236,221,0.55); padding:36px 0; font-size:0.85rem; }
.footer .wrap{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}

/* ---------- RESPONSIVE ---------- */
@media (max-width:860px){
  .hero .wrap{ grid-template-columns:1fr; }
  .domains-grid{ grid-template-columns:1fr; }
  .programs-grid{ grid-template-columns:1fr 1fr; }
  .steps{ grid-template-columns:1fr 1fr; row-gap:28px; }
  .step{ border-inline-start:none; padding-inline-start:0; }
  .chat-shell{ grid-template-columns:1fr; }
  .chat-side{ border-inline-end:none; border-bottom:1px solid var(--line-light); display:flex; gap:8px; overflow-x:auto; }
  .chat-side h4{ display:none; }
  .persona-btn{ white-space:nowrap; width:auto; margin-bottom:0; }
  .pricing-grid{ grid-template-columns:1fr; }
  .price-card.featured{ transform:none; }
  .about-wrap{ grid-template-columns:1fr; }
}
@media (max-width:520px){
  .programs-grid{ grid-template-columns:1fr; }
}
@media (max-width:480px){
  .section{ padding:56px 0; }
  .hero{ padding-top:60px; }
  .hero-actions{ flex-direction:column; align-items:stretch; }
  .hero-actions button{ width:100%; text-align:center; justify-content:center; }
  .steps{ grid-template-columns:1fr; row-gap:24px; }
  .compass{ width:270px; }
  .price-card.featured{ order:-1; }
  .footer .wrap{ flex-direction:column; text-align:center; gap:6px; }
  .auth-modal{ padding:28px 20px; max-width:100%; }
  .price-amount{ font-size:2rem; }
  .domain-card, .program-card, .price-card{ padding:24px 20px; }
}
@media (max-width:360px){

const CURRENCY_MAP = {
  EG: { code:'EGP', rate:49,   symAr:'ج.م', symEn:'EGP' },
  SA: { code:'SAR', rate:3.75, symAr:'ر.س', symEn:'SAR' },
  AE: { code:'AED', rate:3.67, symAr:'د.إ', symEn:'AED' },

  OM: { code:'OMR', rate:0.38, symAr:'ر.ع', symEn:'OMR' },
  JO: { code:'JOD', rate:0.71, symAr:'د.أ', symEn:'JOD' },
  US: { code:'USD', rate:1,    symAr:'$',   symEn:'$'   }
};
const PRO_BASE_USD = 14.99;
let currentCurrency = CURRENCY_MAP.US;

function formatPrice(usdAmount){
  const c = currentCurrency;
  const raw = usdAmount * c.rate;
  const amount = raw >= 10 ? Math.round(raw) : Math.round(raw * 100) / 100;
  const symbol = currentLang === 'ar' ? c.symAr : c.symEn;
  return currentLang === 'ar' ? `${amount} ${symbol}` : (c.code === 'USD' ? `${symbol}${amount}` : `${amount} ${symbol}`);
}

function renderPrices(){
  const freeEl = document.getElementById('price-free-amount');
  const proEl = document.getElementById('price-pro-amount');
  const perMonth = currentLang === 'ar' ? '/شهرياً' : '/mo';
  if(freeEl) freeEl.textContent = formatPrice(0);
  if(proEl) proEl.textContent = formatPrice(PRO_BASE_USD) + perMonth;
}

async function detectCurrency(){
  renderPrices(); // show USD immediately while detecting
  try{
    const res = await fetch('https://ipapi.co/json/');
    const data = await res.json();
    currentCurrency = CURRENCY_MAP[data.country_code] || CURRENCY_MAP.US;
  }catch(e){
    currentCurrency = CURRENCY_MAP.US;
  }
  renderPrices();
}

function openAuth(tab){

async function handleAuthSubmit(e){
  e.preventDefault();
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';

  const name = document.getElementById('auth-name-input').value.trim();
  const email = document.getElementById('auth-email-input').value.trim().toLowerCase();
  const password = document.getElementById('auth-pass-input').value;

  if(!email || !password || (authTab === 'signup' && !name)){
    errEl.textContent = t('authErrRequired');
    return;
  }
  if(password.length < 6){
    errEl.textContent = t('authErrShortPass');
    return;
  }

  const submitBtn = document.getElementById('auth-submit');
  submitBtn.disabled = true;

  try{
    if(authTab === 'signup'){
      const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, data: { name } })
      });
      const data = await res.json();
      if(!res.ok){
        errEl.textContent = data.msg && data.msg.toLowerCase().includes('already')
          ? t('authErrExists') : (data.msg || data.error_description || t('authErrGeneric'));
        submitBtn.disabled = false;
        return;
      }
      if(!data.access_token || !data.user){
        // Email confirmation still required server-side
        errEl.textContent = t('authErrConfirmNeeded');
        submitBtn.disabled = false;
        return;
      }
      // Save the customer profile row (protected by RLS: only this user can write their own row)
      await fetch(`${SUPABASE_URL}/rest/v1/customers`, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${data.access_token}`,
          'Content-Type': 'application/json',
          Prefer: 'return=minimal'
        },
        body: JSON.stringify({ id: data.user.id, name, email })
      });
      currentUser = { id: data.user.id, email, name, accessToken: data.access_token };
    } else {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if(!res.ok){
        errEl.textContent = t('authErrWrongPass');
        submitBtn.disabled = false;
        return;
      }
      const displayName = (data.user && data.user.user_metadata && data.user.user_metadata.name) || email;
      currentUser = { id: data.user.id, email, name: displayName, accessToken: data.access_token };
    }
    closeAuth();
    updateAuthUI();
  }catch(err){
    errEl.textContent = t('authErrGeneric');
  }
  submitBtn.disabled = false;
}

function updateAuthUI(){
  const loginBtn = document.getElementById('nav-login-btn');
  const ctaBtn = document.getElementById('nav-cta-btn');
  const badge = document.getElementById('nav-user-badge');
  if(currentUser){
    loginBtn.style.display = 'none';
    ctaBtn.style.display = 'none';
    badge.style.display = 'flex';
    document.getElementById('nav-user-name').textContent = currentUser.name || currentUser.email;
  } else {
    loginBtn.style.display = '';
    ctaBtn.style.display = '';
    badge.style.display = 'none';
  }
}

function logoutUser(){
  currentUser = null;

}

function renderMessages(){
  const box = document.getElementById('chat-messages');
  box.innerHTML = '';
  if(chatHistory.length === 0){
    appendBubble('bot', t('chatFirstMsg'));
  } else {
    chatHistory.forEach(m => appendBubble(m.role === 'user' ? 'user' : 'bot', m.content));
  }
}

function appendBubble(role, text){
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

async function sendMessage(){
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  document.getElementById('chat-send-btn').disabled = true;

  if(chatHistory.length === 0){
    // seed the visible greeting into history context isn't needed for API, just UI
  }
  chatHistory.push({role:'user', content:text});
  appendBubble('user', text);

  const typing = appendBubble('bot typing', currentLang==='ar' ? 'بيكتب...' : 'Typing...');

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: PERSONA_SYSTEM[currentPersona][currentLang],
        messages: chatHistory.map(m => ({role: m.role, content: m.content}))
      })
    });
    const data = await response.json();
    typing.remove();
    const reply = (data.content || []).filter(b=>b.type==='text').map(b=>b.text).join('\n') ||
      (currentLang==='ar' ? 'حصل خطأ، جرب تاني.' : 'Something went wrong, please try again.');
    chatHistory.push({role:'assistant', content: reply});
    appendBubble('bot', reply);
  }catch(err){
    typing.remove();
    appendBubble('bot', currentLang==='ar' ? 'مش قادر أوصل دلوقتي، جرب تاني بعد شوية.' : 'Can\'t connect right now, please try again shortly.');
  }
  document.getElementById('chat-send-btn').disabled = false;
}
